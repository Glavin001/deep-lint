name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install Ruff
        run: pipx install ruff

      - name: Install Semgrep
        run: pipx install semgrep

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: CLI smoke test
        run: |
          # Smoke test: verify CLI runs without crashing. Exit code 1 is expected (findings exist).
          rc=0
          node dist/cli.js scan --rules rules/typescript --no-llm tests/fixtures/code --format json || rc=$?
          if [ $rc -gt 1 ]; then exit $rc; fi
