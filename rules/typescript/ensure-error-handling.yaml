id: ensure-error-handling
language: typescript
severity: warning
description: "Async functions should have error handling"
pipeline:
  - ast-grep:
      pattern: "async function $FUNC($$$PARAMS) { $$$BODY }"
  - llm:
      prompt: |
        Analyze this async function and determine if it has proper error handling.
        Look for try/catch blocks, .catch() calls, or error callback patterns.

        Function name: $FUNC
        Code:
        $MATCHED_CODE

        If the function has adequate error handling, this is NOT a violation.
        If error handling is missing or insufficient, this IS a violation.
      confidence_threshold: 0.7
