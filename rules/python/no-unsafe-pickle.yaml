id: no-unsafe-pickle
language: python
severity: error
description: "Flag pickle deserialization of untrusted data"
pipeline:
  - ruff:
      select:
        - "S301"
  - llm:
      prompt: |
        Ruff flagged this as suspicious pickle usage (S301).

        Code: $MATCHED_CODE
        File: $FILE_PATH

        Is the data source trusted or untrusted?

        TRUSTED (NOT a violation):
        - Loading from internal cache directories
        - Loading test fixtures
        - pickle.dump (writing, not reading)
        - Data generated by the same application

        UNTRUSTED (IS a violation):
        - Loading user-uploaded files
        - Deserializing network/API response data
        - Loading files from external/unknown sources
        - pickle.loads of bytes from parameters
      confidence_threshold: 0.8
